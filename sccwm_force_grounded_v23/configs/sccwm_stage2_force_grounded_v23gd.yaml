base_config: ../../sccwm_force_grounded_v21a/configs/sccwm_stage2_force_grounded_v21a.yaml

experiment:
  name: stage2_force_grounded_v23gd

model:
  variant: v23gd
  geometry_hidden_dim: 64
  state_refine_hidden_dim: 64
  geometry_adv_grl_lambda: 0.25
  marker_vocab:
    - marker_Array1.jpg
    - marker_Array2.jpg
    - marker_Array_Gelsight.jpg
    - marker_Diamond2.jpg

train:
  output_dir: /datasets/checkpoints/sccwm_force_grounded_v23/stage2_force_grounded_v23gd
  init_from: /datasets/checkpoints/sccwm_force_grounded_v21a/stage2_force_grounded/best.pt
  resume_from: ""
  best_metric: state_mae_depth
  best_mode: min

loss:
  marker_vocab:
    - marker_Array1.jpg
    - marker_Array2.jpg
    - marker_Array_Gelsight.jpg
    - marker_Diamond2.jpg
  geometry_scale_confusion: 0.10
  geometry_branch_confusion: 0.05
  geometry_marker_confusion: 0.05
  geometry_deconf_consistency: 0.05

system:
  wandb_name: stage2_force_grounded_v23gd
