base_config: ../../sccwm_force_grounded_v24/configs/sccwm_stage2_force_grounded_v24fgof.yaml

experiment:
  name: stage2_force_grounded_v25scfgof

model:
  variant: v25scfgof
  geometry_hidden_dim: 64
  state_refine_hidden_dim: 64
  geometry_adv_grl_lambda: 0.25
  pose_adv_grl_lambda: 0.10
  operator_dim: 32
  canon_shared_dim: 64
  canon_load_dim: 64
  canon_pose_dim: 64
  canonical_force_align_dim: 6
  enable_swap_decode: true
  enable_split_canonical: true
  marker_vocab:
    - marker_Array1.jpg
    - marker_Array2.jpg
    - marker_Array_Gelsight.jpg
    - marker_Diamond2.jpg

train:
  output_dir: /datasets/checkpoints/sccwm_force_grounded_v25/stage2_force_grounded_v25scfgof
  init_from: /datasets/checkpoints/sccwm_force_grounded_v24/analysis_v24/v24fgof/train/best.pt
  resume_from: ""
  best_metric: state_mae_depth
  best_mode: min

loss:
  marker_vocab:
    - marker_Array1.jpg
    - marker_Array2.jpg
    - marker_Array_Gelsight.jpg
    - marker_Diamond2.jpg
  load_scale_confusion: 0.10
  load_branch_confusion: 0.05
  load_marker_confusion: 0.05
  pose_scale_confusion: 0.03
  pose_branch_confusion: 0.02
  pose_marker_confusion: 0.02
  operator_scale_supervision: 0.10
  operator_branch_supervision: 0.05
  operator_marker_supervision: 0.05
  pose_consistency: 0.05
  load_consistency: 0.05
  load_pose_independence: 0.02
  load_operator_independence: 0.02
  pose_operator_independence: 0.02
  force_guidance_weight: 0.25
  canonical_force_alignment: 1.0
  canonical_force_similarity_distill: 0.25
  force_weighted_load_pair_consistency: 0.50

system:
  wandb_name: stage2_force_grounded_v25scfgof
