base_config: ../../sccwm/configs/sccwm_stage2.yaml

experiment:
  name: sccwm_stage2_force_grounded

dataset:
  train_dataset_a_root: /datasets/usa_static_v1_large_run_blackborder_3px/scheme_s_lite_adapter_train_seq
  val_dataset_a_root: /datasets/usa_static_v1_large_run_blackborder_3px/scheme_s_lite_adapter_val_seq_small
  test_dataset_a_root: /datasets/usa_static_v1_large_run_blackborder_3px/scheme_s_lite_adapter_final_unseen_test_seq_small
  train_dataset_a_assets_root: /datasets/usa_static_v1_large_run/scheme_s_lite_adapter_train_seq
  val_dataset_a_assets_root: /datasets/usa_static_v1_large_run/scheme_s_lite_adapter_val_seq_small
  test_dataset_a_assets_root: /datasets/usa_static_v1_large_run/scheme_s_lite_adapter_final_unseen_test_seq_small
  train_index_file: /datasets/usa_static_v1_large_run/scheme_s_lite_adapter_train_seq/pair_index_train.jsonl
  val_index_file: /datasets/usa_static_v1_large_run/scheme_s_lite_adapter_val_seq_small/pair_index_val.jsonl
  test_index_file: /datasets/usa_static_v1_large_run/scheme_s_lite_adapter_final_unseen_test_seq_small/pair_index_test.jsonl
  gray_cache_max_items: 1024

model:
  reconstruct_observation: false
  z_force_dim: 6

train:
  output_dir: /datasets/checkpoints/sccwm_force_grounded_v2/stage2_force_grounded
  batch_size: 8
  val_batch_size: 4
  workers: 4
  allow_large_index_workers: true
  init_from: /datasets/checkpoints/sccwm_120h_full/stage1_world/best.pt
  resume_from: ""
  best_metric: state_mae_depth
  best_mode: min

loss:
  feature_recon: 0.25
  aux_observation_recon: 0.0
  temporal_consistency: 0.05
  rest_state_lock: 0.05
  state_supervision: 1.0
  state_consistency: 0.10
  geometry_consistency: 0.10
  force_proxy_depth: 1.0
  force_proxy_contact_intensity: 0.5
  force_latent_consistency: 0.25
  force_variance: 0.05
  force_variance_floor: 0.5
  state_weight_x: 0.5
  state_weight_y: 0.5
  state_weight_depth: 2.0
  grad_clip_norm: 1.0

system:
  wandb_name: sccwm_stage2_force_grounded

